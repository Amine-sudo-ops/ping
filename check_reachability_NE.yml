
# =============================================================================
# Playbook  : cisco_reachability_check.yml
# Purpose   : Check reachability of all Cisco switches in the inventory
# Platform  : Ansible AWX
# Author    : Network Engineering Team
# Date      : 2026-04-16
# =============================================================================
# Requirements:
#   - Collection: cisco.ios (ansible-galaxy collection install cisco.ios)
#   - Collection: ansible.netcommon
#   - AWX Credential type: Network (SSH or username/password)
#
# Inventory group example (inventory/hosts.yml):
#   all:
#     hosts:
#       sw-core-01:
#         ansible_host: 192.168.1.1
#       sw-access-02:
#         ansible_host: 192.168.1.2
#       sw-access-03:
#         ansible_host: 192.168.1.3
#     vars:
#       ansible_network_os: cisco.ios.ios
#       ansible_connection: ansible.netcommon.network_cli
#       ansible_user: "{{ vault_switch_user }}"
#       ansible_password: "{{ vault_switch_password }}"
#       ansible_become: true
#       ansible_become_method: enable
#       ansible_become_password: "{{ vault_enable_password }}"
# =============================================================================

- name: Check reachability of all Cisco switches
  hosts: all
  gather_facts: false
  ignore_unreachable: true   # Do NOT mark task as failed if host is unreachable
  
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
tasks:

    - name: Send 'show clock' command to verify connectivity
      cisco.ios.ios_command:
        commands:
          - show clock
      register: probe_result
      ignore_errors: true

    - name: Set host status to REACHABLE
      ansible.builtin.set_fact:
        host_status: "REACHABLE"
      when:
        - probe_result is not unreachable
        - probe_result is not failed

    - name: Set host status to UNREACHABLE
      ansible.builtin.set_fact:
        host_status: "UNREACHABLE"
      when: >
        probe_result is unreachable or
        probe_result is failed

    - name: "[REACHABLE] {{ inventory_hostname }} ({{ ansible_host | default('no IP') }})"
      ansible.builtin.debug:
        msg: "Host {{ inventory_hostname }} ({{ ansible_host | default('no IP') }}) is REACHABLE"
      when: host_status == "REACHABLE"

    - name: "[UNREACHABLE] {{ inventory_hostname }} ({{ ansible_host | default('no IP') }})"
      ansible.builtin.debug:
        msg: "Host {{ inventory_hostname }} ({{ ansible_host | default('no IP') }}) is UNREACHABLE"
      when: host_status == "UNREACHABLE"


    - name: Fail the playbook if any switch is unreachable
      ansible.builtin.fail:
        msg: "One or more switches are UNREACHABLE: {{ unreachable_hosts }}"
      when: unreachable_hosts | length > 0
