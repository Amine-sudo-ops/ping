- name: Check Cisco switch reachability
  hosts: all
  gather_facts: no
  connection: ansible.netcommon.network_cli

  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: Verify switch is reachable
      cisco.ios.ios_command:
        commands:
          - show version
      register: result

    - name: Display switch response
      debug:
        msg: "{{ inventory_hostname }} is reachable"
